    <!-- Données structurées FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

          "@type": "Question",
          "name": "Qu'est-ce que Nurse-dle ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nurse-dle est un jeu de devinette quotidien inspiré de Wordle, conçu pour les étudiants infirmiers. Il propose de deviner des pathologies à travers différents modes de jeu."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de pathologies sont disponibles ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nurse-dle contient plus de 210 pathologies couvrant les principaux domaines de la santé enseignés en IFSI."
          }
        },
        {
          "@type": "Question",
          "name": "Quels sont les modes de jeu disponibles ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nurse-dle propose 4 modes de jeu : le Mode Classique (comparaison de caractéristiques), le Mode Citation (à partir de citations de patients), le Mode Emoji (à partir d'émojis) et le Mode Duel (multijoueur en temps réel)."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que Nurse-dle est gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Nurse-dle est entièrement gratuit et accessible à tous les étudiants infirmiers."
          }
        }
      ]
    }
